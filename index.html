<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fo.co - TDAH Productivity</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0F0F0F;--surface:#1A1A1A;--surface2:#222;--border:#2E2E2E;
  --text:#EFEFEF;--text-soft:#999;--text-muted:#555;
  --accent:#C8B47A;--accent-dim:#3A3020;--accent-hover:#D9C98E;
  --green:#4CAF7D;--green-dim:#1A2E22;--red:#E05252;--red-dim:#2E1A1A;
  --r:8px;--r-sm:5px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}

/* SETUP SCREEN */
#setup-screen{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.setup-box{max-width:480px;width:100%}
.setup-logo{font-size:28px;font-weight:600;margin-bottom:8px}
.setup-logo span{color:var(--accent)}
input,textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 14px;color:var(--text);font-family:inherit;margin-bottom:12px;outline:none}
input:focus{border-color:var(--accent)}
.btn{padding:12px 18px;border:none;border-radius:var(--r-sm);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:0.2s;width:100%}
.btn-primary{background:var(--accent);color:#0F0F0F}
.btn-primary:hover{background:var(--accent-hover)}

/* LAYOUT */
.sidebar{width:200px;background:var(--surface);border-right:1px solid var(--border);padding:24px 0;display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0}
.nav-item{padding:12px 20px;cursor:pointer;color:var(--text-soft);font-weight:500}
.nav-item.active{color:var(--accent);background:var(--accent-dim);border-left:3px solid var(--accent)}
.main{margin-left:200px;padding:32px;max-width:900px}
.page{display:none}.page.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:16px}
.task-item{display:flex;align-items:center;gap:12px;padding:12px;border-bottom:1px solid var(--border)}
.tag{font-size:10px;padding:2px 6px;border-radius:3px;background:var(--surface2);text-transform:uppercase}

/* TOAST */
#toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:var(--r);background:var(--surface);border:1px solid var(--border);z-index:1000;display:none}

@media(max-width:700px){.sidebar{display:none}.main{margin-left:0}}
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup-screen">
  <div class="setup-box">
    <div class="setup-logo">fo<span>.</span>co</div>
    <p style="color:var(--text-soft);margin-bottom:20px">Insira sua chave API do Google Gemini:</p>
    <input type="password" id="setup-key" placeholder="AIzaSy...">
    <button class="btn btn-primary" onclick="saveApiKey()">Entrar no app</button>
    <p style="font-size:11px;color:var(--text-muted);margin-top:15px;text-align:center">
        Se o app não funcionar, verifique se seu país tem acesso ao Gemini ou se há extensões bloqueando a conexão.
    </p>
  </div>
</div>

<nav class="sidebar">
  <div style="padding:0 20px 20px;font-size:18px;font-weight:700">fo<span>.</span>co</div>
  <div class="nav-item active" onclick="showPage('tarefas',this)">Tarefas</div>
  <div class="nav-item" onclick="showPage('agenda',this)">Agenda</div>
  <div style="margin-top:auto;padding:20px;font-size:10px;color:var(--text-muted);cursor:pointer" onclick="resetKey()">Trocar Chave API</div>
</nav>

<div class="main">
  <div class="page active" id="page-tarefas">
    <h2>Tarefas</h2>
    <div class="card" style="margin-top:20px">
      <textarea id="task-input" placeholder="O que você precisa fazer? (Pode escrever tudo misturado)" rows="4"></textarea>
      <button class="btn btn-primary" id="ai-btn" onclick="addTask()">Organizar com IA</button>
    </div>
    <div id="task-list"></div>
  </div>

  <div class="page" id="page-agenda">
    <h2>Agenda</h2>
    <div id="agenda-list" style="margin-top:20px"></div>
  </div>
</div>

<div id="toast"></div>

<script>
let tasks = JSON.parse(localStorage.getItem('foco_tasks')) || [];
let apiKey = localStorage.getItem('foco_key') || '';

// Inicialização
if(apiKey) document.getElementById('setup-screen').style.display = 'none';
renderTasks();

function saveApiKey() {
    const key = document.getElementById('setup-key').value.trim();
    if(!key) return alert("Por favor, insira a chave.");
    localStorage.setItem('foco_key', key);
    apiKey = key;
    document.getElementById('setup-screen').style.display = 'none';
    showToast("Chave salva! Tentando conexão...", "green");
}

function resetKey() {
    localStorage.removeItem('foco_key');
    location.reload();
}

async function callGemini(prompt) {
    // Usando v1 estável e modelo flash
    const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
    
    try {
        const response = await fetch(url, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }]
            })
        });

        const data = await response.json();

        if (!response.ok) {
            // ERRO DETALHADO PARA DEBUG
            const errorMsg = data.error?.message || "Erro desconhecido";
            const errorCode = data.error?.status || response.status;
            alert(`ERRO DA API (${errorCode}): ${errorMsg}`);
            throw new Error(errorMsg);
        }

        return data.candidates[0].content.parts[0].text;
    } catch (e) {
        console.error(e);
        throw e;
    }
}

async function addTask() {
    const input = document.getElementById('task-input');
    const btn = document.getElementById('ai-btn');
    const text = input.value.trim();
    if(!text) return;

    btn.disabled = true;
    btn.textContent = "Processando...";

    const prompt = `Atue como assistente para TDAH. Transforme o texto abaixo em uma lista de tarefas JSON. 
    Responda APENAS o JSON puro, sem markdown, no formato: {"tarefas": [{"nome": "...", "prioridade": "alta|media|baixa"}]}
    Texto: "${text}"`;

    try {
        const result = await callGemini(prompt);
        const cleanJson = result.replace(/```json/g, '').replace(/```/g, '').trim();
        const data = JSON.parse(cleanJson);
        
        data.tarefas.forEach(t => {
            tasks.unshift({id: Date.now() + Math.random(), nome: t.nome, prioridade: t.prioridade, done: false});
        });
        
        saveTasks();
        renderTasks();
        input.value = "";
        showToast("IA organizou suas tarefas!", "green");
    } catch (e) {
        showToast("Falha na IA. Verifique a chave ou sua internet.", "red");
    } finally {
        btn.disabled = false;
        btn.textContent = "Organizar com IA";
    }
}

function renderTasks() {
    const list = document.getElementById('task-list');
    list.innerHTML = tasks.map(t => `
        <div class="task-item">
            <input type="checkbox" ${t.done ? 'checked' : ''} onclick="toggleTask(${t.id})">
            <div style="flex:1; ${t.done ? 'text-decoration:line-through;opacity:0.5' : ''}">
                ${t.nome} <span class="tag">${t.prioridade}</span>
            </div>
            <button style="background:none;border:none;color:var(--red);cursor:pointer" onclick="deleteTask(${t.id})">excluir</button>
        </div>
    `).join('');
}

function toggleTask(id) {
    const t = tasks.find(x => x.id === id);
    if(t) t.done = !t.done;
    saveTasks();
    renderTasks();
}

function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    saveTasks();
    renderTasks();
}

function saveTasks() { localStorage.setItem('foco_tasks', JSON.stringify(tasks)); }

function showPage(name, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    el.classList.add('active');
}

function showToast(msg, color) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    t.style.borderLeft = `4px solid var(--${color})`;
    setTimeout(() => t.style.display = 'none', 3000);
}
</script>
</body>
</html>
